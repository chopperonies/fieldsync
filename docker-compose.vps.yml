services:
  linkcrew-web:
    build:
      context: .
    command: ["node", "start.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    restart: unless-stopped
    init: true
    mem_limit: 1536m
    cpus: 1.50

  linkcrew-bot:
    build:
      context: .
    command: ["node", "bot/index.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    init: true
    mem_limit: 768m
    cpus: 0.75

  kdg-site:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - ./kdg-site:/usr/share/nginx/html:ro
      - ./deploy/nginx/kdg-site.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    mem_limit: 128m
    cpus: 0.25

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - linkcrew-web
      - kdg-site
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/vps.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
