upstream linkcrew_web {
  server linkcrew-web:3000;
}

upstream kdg_site {
  server kdg-site:80;
}

server {
  listen 80;
  server_name linkcrew.io www.linkcrew.io kingstondatagroup.com www.kingstondatagroup.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name linkcrew.io www.linkcrew.io;

  ssl_certificate /etc/letsencrypt/live/linkcrew.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/linkcrew.io/privkey.pem;

  client_max_body_size 20m;

  location / {
    proxy_pass http://linkcrew_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
  }
}

server {
  listen 443 ssl http2;
  server_name kingstondatagroup.com www.kingstondatagroup.com;

  ssl_certificate /etc/letsencrypt/live/kingstondatagroup.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kingstondatagroup.com/privkey.pem;

  location / {
    proxy_pass http://kdg_site;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
